[module]
name = "fmt"

[headers]
include_dirs = [
    "samples/fmt/include"
]
library_headers = [
    "fmt/args.h",
    "fmt/chrono.h",
    "fmt/color.h",
    "fmt/compile.h",
    "fmt/format.h",
    { path = "fmt/os.h", condition = "FMT_OS" },
    "fmt/ostream.h",
    "fmt/printf.h",
    "fmt/ranges.h",
    "fmt/std.h",
    "fmt/xchar.h"
]
header_guard_format = "FMT_(\\w+)_H_"

[macros]
expand_from_definition = [
]
explicit_macros = [
    "FMT_BEGIN_NAMESPACE=namespace fmt {",
    "FMT_END_NAMESPACE=}",
    "FMT_API",
    "FMT_EXPORT",
    "FMT_DEPRECATED=[[deprecated]]",
    "FMT_BEGIN_EXPORT",
    "FMT_END_EXPORT",
    "FMT_NORETURN=[[noreturn]]",
    "FMT_NODISCARD=[[nodiscard]]",
    "FMT_NO_UNIQUE_ADDRESS=[[no_unique_address]]",
    "FMT_CONSTEXPR=constexpr",
    "FMT_CONSTEVAL=consteval",
    "FMT_CONSTEXPR20=constexpr",
    "FMT_ALWAYS_INLINE=inline",
    "FMT_FUNC=inline",
    "FMT_INLINE=inline",
    "FMT_PRAGMA_GCC(x)",
    "FMT_PRAGMA_CLANG(x)"
]

[symbols]
exclude = [
    "fmt::detail"
]